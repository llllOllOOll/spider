<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <title>Products</title>
</head>
<body>
<section class="section">
  <div class="container">
    <div class="level">
      <div class="level-left"><h1 class="title">Products</h1></div>
      <div class="level-right">
        <button class="button is-primary" hx-get="/products/new" hx-target="#product-form">+ Add Product</button>
      </div>
    </div>

    <div id="product-form"></div>

    <div class="box p-0">
      <table class="table is-fullwidth is-hoverable is-striped">
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Product ID</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="product-list">
          {% for product in items %}
          <tr>
            <td><span class="tag is-primary is-light">{{ product.name }}</span></td>
            <td><code class="is-size-7">#{{ product.id }}</code></td>
            <td><strong>${{ product.price }}</strong></td>
            <td>{{ product.stock }} pcs</td>
            <td><span class="tag is-info is-light">Active</span></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>
</body>
</html>
