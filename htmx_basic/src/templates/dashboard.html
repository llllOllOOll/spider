<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --bg: #050505; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --purple: #8a05be; }
        body { background: var(--bg); color: #efefef; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: clip; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); gap: 24px; max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .dashboard-grid.detail-active { grid-template-columns: 1fr 450px; }

        .glass-card {
            background: var(--card); backdrop-filter: blur(12px); border-radius: 20px;
            border: 1px solid var(--border); padding: 24px; transition: 0.3s; cursor: pointer;
            position: relative;
        }
.glass-card:hover { border-color: var(--purple); background: rgba(255,255,255,0.05); transform: translateY(-2px); }
.glass-card.is-flex { width: 100%; }
.glass-card.is-flex > * { pointer-events: none; }
.glass-card.is-flex { pointer-events: auto; }
        .glass-card.is-active { border-color: var(--purple); box-shadow: 0 0 30px rgba(138,5,190,0.1); background: rgba(138,5,190,0.03); }

        .stat-label { font-size: 0.7rem; color: #777; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .val-mono { font-family: 'JetBrains Mono', monospace; font-weight: 700; }

        #detail-pane::-webkit-scrollbar { width: 4px; }
        #detail-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .variance-up { color: #ef4444; }
        .variance-down { color: #10b981; }

        .drawer-overlay { display: none; }

        @media (max-width: 1024px) {
            .dashboard-grid.detail-active { grid-template-columns: 1fr; }

            aside {
                position: fixed !important;
                top: 0 !important;
                right: 0 !important;
                width: 100% !important;
                max-width: 480px !important;
                height: 100vh !important;
                z-index: 1000;
                border-radius: 0 !important;
                box-shadow: -8px 0 32px rgba(0,0,0,0.5);
            }

            .drawer-overlay {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.6);
                z-index: 999;
            }
        }
    </style>
</head>
<body x-data="{ detailOpen: false, activeId: null }">

    <div class="dashboard-grid" :class="detailOpen ? 'detail-active' : ''">

        <main>
            <header class="is-flex is-justify-content-space-between is-align-items-end mb-6">
                <div>
                    <p class="stat-label mb-1">Visão Geral / Média</p>
                    <h1 class="title is-2 has-text-white val-mono">{{ avg_str }}</h1>
                </div>
                <div class="has-text-right is-hidden-mobile">
                    <p class="stat-label mb-1">Pico de Gastos</p>
                    <p class="is-size-4 has-text-white val-mono">{{ biggest_str }}</p>
                </div>
            </header>

            <div class="columns is-multiline">
                {% for row in summaries %}
                <div class="column is-12">
                    <div class="glass-card is-flex is-align-items-center"
                         :class="activeId == '{{ row.month_id }}-{{ row.year_id }}' ? 'is-active' : ''"
                         hx-get="/details?m={{ row.month_id }}&y={{ row.year_id }}"
                         hx-target="#detail-pane"
                         @click="detailOpen = true; activeId = '{{ row.month_id }}-{{ row.year_id }}'">

                        <div class="is-flex-grow-1">
                            <h3 class="has-text-weight-bold is-size-5 mb-0">{{ row.label }}</h3>
                            <p class="is-size-7 has-text-grey">{{ row.period_range }}</p>
                        </div>

                        <div class="has-text-right">
                            <p class="val-mono is-size-5 mb-0">{{ row.amount_str }}</p>
                            <span class="is-size-7 {{ row.variance_class }} has-text-weight-bold">{{ row.variance_str }}</span>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </main>

        <div class="drawer-overlay" x-show="detailOpen" @click="detailOpen = false; activeId = null"></div>

        <aside x-show="detailOpen"
               x-transition:enter="transition ease-out duration-300"
               x-transition:enter-start="opacity-0 translate-x-10"
               class="glass-card" style="position: sticky; top: 2rem; height: calc(100vh - 4rem); cursor: default;">

            <div class="is-flex is-justify-content-space-between is-align-items-center mb-6">
                <h3 class="title is-5 has-text-white mb-0">Detalhamento</h3>
                <button class="delete is-medium" @click="detailOpen = false; activeId = null"></button>
            </div>

            <div id="detail-pane" style="overflow-y: auto; height: calc(100vh - 12rem);">
                <div class="has-text-centered py-6">
                    <p class="has-text-grey is-size-7">Selecione um mês para ver os itens...</p>
                </div>
            </div>
        </aside>

    </div>

</body>
</html>
