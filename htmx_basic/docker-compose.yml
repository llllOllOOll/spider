version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8082:8082"
    environment:
      - HOST=0.0.0.0
      - PORT=8082
      - DATABASE_URL=postgres://spider:spider@db:5432/smoney
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=spider
      - POSTGRES_PASSWORD=spider
      - POSTGRES_DB=db_users
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spider"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
