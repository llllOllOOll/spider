<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider OS - Dashboard</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --panel: #1a1a1a;
            --border: #2a2a2a;
            --accent: #a3ff12;
            --text-main: #e0e0e0;
            --text-dim: #666666;
            --error: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo { color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        .grid-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
        }

        .panel-header {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .stats-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .big-value { font-size: 32px; color: var(--text-main); font-weight: 300; }
        .unit { color: var(--text-dim); font-size: 14px; }

        .log-container {
            background: #000;
            border-radius: 4px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.6;
            border: 1px solid #222;
        }
        .log-line { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 8px; }
        .log-ts { color: var(--text-dim); margin-right: 8px; }
        .log-msg { color: #88ff88; }
        .log-path { color: var(--accent); }

        .pill {
            background: var(--border);
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 10px;
            color: var(--accent);
        }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 10px;
        }
    </style>
</head>
<body x-data="dashboard()" x-init="start()">

    <div class="header">
        <div class="logo">🕸️ SPIDER</div>
        <div x-text="time"></div>
    </div>

    <div class="grid-top">
        <div class="panel">
            <div class="panel-header"><span>Uptime</span></div>
            <div class="stats-row">
                <div>
                    <div class="big-value" x-text="formatUptime(metrics.uptime_seconds || 0)">00:00:00</div>
                    <div class="unit">server uptime</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Requests</span></div>
            <div class="stats-row">
                <div>
                    <div class="big-value" x-text="metrics.total_requests || 0">0</div>
                    <div class="unit">total requests</div>
                </div>
                <div class="pill" :style="metrics.error_count > 0 ? 'background: #ff4444; color: white;' : ''">Errors: <span x-text="metrics.error_count || 0">0</span></div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">Realtime Logs</div>
        <div class="log-container" id="logBox">
            <template x-for="log in logs">
                <div class="log-line">
                    <span class="log-ts" x-text="log.time"></span>
                    <span class="log-msg" x-text="log.method"></span>
                    <span class="log-path" x-text="log.path"></span>
                    <span style="color: #666">-> matched handler</span>
                </div>
            </template>
        </div>
    </div>

    <div class="footer">
        <span>Powered by <a href="https://github.com/llllOllOOll/spider" target="_blank" style="color: var(--accent); text-decoration: none;">Zig & seven</a></span>
        <span>This site's source is <a href="https://github.com/llllOllOOll/spider" target="_blank" style="color: var(--text-dim); text-decoration: none;">on GitHub</a></span>
        <span x-text="'Uptime: ' + formatUptime(metrics.uptime_seconds)"></span>
    </div>

<script>
function dashboard() {
    return {
        metrics: { total_requests: 0, error_count: 0, uptime_seconds: 0 },
        logs: [],
        time: '',

        start() {
            setInterval(() => {
                this.time = new Date().toLocaleTimeString();
            }, 1000);
            this.tick();
            setInterval(() => this.tick(), 2000);
        },

        async tick() {
            try {
                const res = await fetch('/metrics');
                this.metrics = await res.json();
                const logsRes = await fetch('/logs');
                this.logs = await logsRes.json();
                if(this.logs.length > 10) this.logs = this.logs.slice(-10);
            } catch(e) { /* server offline */ }
        },

        formatUptime(s) {
            if (!s) return '00:00:00';
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }
    }
}
</script>
</body>
</html>
