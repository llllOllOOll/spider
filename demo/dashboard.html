<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider — Tasks Dashboard</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --panel: #1a1a1a;
            --border: #2a2a2a;
            --accent: #a3ff12;
            --text-main: #e0e0e0;
            --text-dim: #666666;
            --success: #44ff44;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo { color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .panel-header {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover { opacity: 0.9; }

        .task-list { list-style: none; }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .task-item:last-child { border-bottom: none; }

        .task-id { color: var(--text-dim); font-size: 10px; width: 24px; }

        .task-title { flex: 1; }

        .task-status {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .status-pending { background: #333; color: #ffaa00; }
        .status-completed { background: #1a3a1a; color: var(--success); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        .ws-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: var(--text-dim);
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
        }

        .ws-dot.connected { background: var(--success); }

        .clients-count { color: var(--accent); }
    </style>
</head>
<body x-data="tasksApp()" x-init="init()">

    <div class="header">
        <div class="logo">🕸️ Spider — Tasks</div>
        <div class="ws-indicator">
            <div class="ws-dot" :class="{ connected: wsConnected }"></div>
            <span x-text="wsConnected ? 'Connected' : 'Disconnected'"></span>
            <span>•</span>
            <span><span class="clients-count" x-text="clientCount"></span> clients</span>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header"><span>Add Task</span></div>
        <div class="input-row">
            <input type="text" x-model="newTaskTitle" @keydown.enter="addTask()" placeholder="Enter task title..." />
            <button @click="addTask()" :disabled="!newTaskTitle.trim()">Add Task</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span>Tasks</span>
            <span x-text="tasks.length + ' total'"></span>
        </div>
        <ul class="task-list" x-show="tasks.length > 0">
            <template x-for="task in tasks" :key="task.id">
                <li class="task-item">
                    <span class="task-id" x-text="task.id"></span>
                    <span class="task-title" x-text="task.title"></span>
                    <span class="task-status" :class="task.status === 'completed' ? 'status-completed' : 'status-pending'" x-text="task.status"></span>
                </li>
            </template>
        </ul>
        <div class="empty-state" x-show="tasks.length === 0">
            No tasks yet. Add one above!
        </div>
    </div>

<script>
function tasksApp() {
    return {
        tasks: [],
        newTaskTitle: '',
        wsConnected: false,
        clientCount: 0,
        ws: null,

        init() {
            this.loadTasks();
            this.connectWs();
        },

        async loadTasks() {
            try {
                const res = await fetch('/tasks');
                this.tasks = await res.json();
            } catch(e) {
                console.error('Failed to load tasks:', e);
            }
        },

        async addTask() {
            const title = this.newTaskTitle.trim();
            if (!title) return;

            try {
                const res = await fetch('/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (res.ok) {
                    this.newTaskTitle = '';
                    // Task will be added via WebSocket
                }
            } catch(e) {
                console.error('Failed to add task:', e);
            }
        },

        connectWs() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            this.ws = new WebSocket(`${protocol}//${location.host}/ws`);

            this.ws.onopen = () => {
                this.wsConnected = true;
            };

            this.ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'task_added') {
                        this.tasks.unshift(msg.task);
                    } else if (msg.type === 'client_count') {
                        this.clientCount = msg.count;
                    }
                } catch(e) {
                    // Non-JSON message (e.g., from echo test)
                    console.log('WS:', event.data);
                }
            };

            this.ws.onclose = () => {
                this.wsConnected = false;
                setTimeout(() => this.connectWs(), 2000);
            };
        }
    }
}
</script>
</body>
</html>
