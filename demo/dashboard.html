<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider — Tasks Dashboard</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --panel: #1a1a1a;
            --border: #2a2a2a;
            --accent: #a3ff12;
            --text-main: #e0e0e0;
            --text-dim: #666666;
            --success: #44ff44;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo { color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        .grid-top {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .panel-header {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .stats-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .big-value { font-size: 28px; color: var(--text-main); font-weight: 300; }
        .unit { color: var(--text-dim); font-size: 11px; }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover { opacity: 0.9; }

        .task-list { 
            list-style: none; 
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .task-item:last-child { border-bottom: none; }

        .task-id { color: var(--text-dim); font-size: 10px; width: 24px; }

        .task-title { flex: 1; }

        .task-status {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .status-pending { background: #333; color: #ffaa00; }
        .status-completed { background: #1a3a1a; color: var(--success); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        .ws-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: var(--text-dim);
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }

        .ws-dot.connected { background: var(--success); }

        .clients-count { color: var(--accent); }

        .pill {
            background: var(--border);
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 10px;
            color: var(--accent);
        }

        .pill.error { background: #ff4444; color: white; }

        .log-container {
            background: #000;
            border-radius: 4px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.6;
            border: 1px solid #222;
        }
        .log-line { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 8px; }
        .log-ts { color: var(--text-dim); margin-right: 8px; }
        .log-msg { color: #88ff88; }
        .log-path { color: var(--accent); }
    </style>
</head>
<body x-data="tasksApp()" x-init="init()">

    <div class="header">
        <div class="logo">🕸️ Spider — Tasks</div>
        <div class="ws-indicator">
            <div class="ws-dot" :class="{ connected: wsConnected }"></div>
            <span x-text="wsConnected ? 'Connected' : 'Disconnected'"></span>
            <span>•</span>
            <span><span class="clients-count" x-text="clientCount"></span> clients</span>
        </div>
    </div>

    <div class="grid-top">
        <div class="panel">
            <div class="panel-header"><span>Uptime</span></div>
            <div class="stats-row">
                <div>
                    <div class="big-value" x-text="formatUptime(metrics.uptime_seconds || 0)">00:00:00</div>
                    <div class="unit">server uptime</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Requests</span></div>
            <div class="stats-row">
                <div>
                    <div class="big-value" x-text="metrics.total_requests || 0">0</div>
                    <div class="unit">total requests</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Errors</span></div>
            <div class="stats-row">
                <div>
                    <div class="big-value" :class="{ 'error': metrics.error_count > 0 }" x-text="metrics.error_count || 0">0</div>
                    <div class="unit">error count</div>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header"><span>Add Task</span></div>
        <div class="input-row">
            <input type="text" x-model="newTaskTitle" @keydown.enter="addTask()" placeholder="Enter task title..." />
            <button @click="addTask()" :disabled="!newTaskTitle.trim() || isAdding" x-text="isAdding ? 'Adding...' : 'Add Task'">Add Task</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span>Tasks</span>
            <span x-text="tasks.length + ' total'"></span>
        </div>
        <ul class="task-list" x-show="tasks.length > 0">
            <template x-for="task in tasks" :key="task.id">
                <li class="task-item">
                    <span class="task-id" x-text="task.id"></span>
                    <span class="task-title" x-text="task.title"></span>
                    <span class="task-status" :class="task.status === 'completed' ? 'status-completed' : 'status-pending'" x-text="task.status"></span>
                </li>
            </template>
        </ul>
        <div class="empty-state" x-show="tasks.length === 0">
            No tasks yet. Add one above!
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">Realtime Logs</div>
        <div class="log-container" id="logBox">
            <template x-for="log in logs">
                <div class="log-line">
                    <span class="log-ts" x-text="log.time"></span>
                    <span class="log-msg" x-text="log.method"></span>
                    <span class="log-path" x-text="log.path"></span>
                </div>
            </template>
            <div class="empty-state" x-show="logs.length === 0">No logs yet...</div>
        </div>
    </div>

<script>
function tasksApp() {
    return {
        tasks: [],
        newTaskTitle: '',
        isAdding: false,
        wsConnected: false,
        clientCount: 0,
        ws: null,
        metrics: { total_requests: 0, error_count: 0, uptime_seconds: 0 },
        logs: [],

        init() {
            this.loadTasks();
            this.connectWs();
            this.loadMetrics();
            this.loadLogs();
            setInterval(() => this.loadMetrics(), 3000);
            setInterval(() => this.loadLogs(), 2000);
        },

        async loadLogs() {
            try {
                const res = await fetch('/logs');
                if (res.ok) {
                    this.logs = await res.json();
                    if (this.logs.length > 20) this.logs = this.logs.slice(-20);
                }
            } catch(e) {}
        },

        async loadTasks() {
            try {
                const res = await fetch('/tasks');
                if (res.ok) {
                    this.tasks = await res.json();
                }
            } catch(e) {
                console.error('Failed to load tasks:', e);
            }
        },

        async loadMetrics() {
            try {
                const res = await fetch('/metrics');
                if (res.ok) {
                    const data = await res.json();
                    this.metrics.total_requests = data.total_requests || 0;
                    this.metrics.error_count = data.error_count || 0;
                    this.metrics.uptime_seconds = data.uptime_seconds || 0;
                }
            } catch(e) {
                console.error('Failed to load metrics:', e);
            }
        },

        async addTask() {
            const title = this.newTaskTitle.trim();
            if (!title) return;

            this.isAdding = true;
            try {
                const res = await fetch('/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (res.ok) {
                    this.newTaskTitle = '';
                }
            } catch(e) {
                console.error('Failed to add task:', e);
            } finally {
                this.isAdding = false;
            }
        },

        connectWs() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            console.log('Connecting to WebSocket:', wsUrl);
            this.ws = new WebSocket(wsUrl);

            this.ws.onopen = () => {
                console.log('WebSocket connected');
                this.wsConnected = true;
            };

            this.ws.onmessage = (event) => {
                console.log('WS message:', event.data);
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'task_added') {
                        this.tasks.unshift(msg.task);
                    } else if (msg.type === 'client_count') {
                        this.clientCount = msg.count;
                    }
                } catch(e) {
                    console.log('Non-JSON WS:', event.data);
                }
            };

            this.ws.onerror = (e) => {
                console.error('WebSocket error:', e);
            };

            this.ws.onclose = () => {
                console.log('WebSocket closed, reconnecting...');
                this.wsConnected = false;
                setTimeout(() => this.connectWs(), 2000);
            };
        },

        formatUptime(s) {
            if (!s) return '00:00:00';
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }
    }
}
</script>
</body>
</html>
