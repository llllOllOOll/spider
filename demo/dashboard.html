<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider OS - Dashboard</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --panel: #1a1a1a;
            --border: #2a2a2a;
            --accent: #a3ff12;
            --text-main: #e0e0e0;
            --text-dim: #666666;
            --error: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo { color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        .grid-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
        }

        .panel-header {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .stats-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .big-value { font-size: 32px; color: var(--text-main); font-weight: 300; }
        .unit { color: var(--text-dim); font-size: 14px; }

        .log-container {
            background: #000;
            border-radius: 4px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.6;
            border: 1px solid #222;
        }
        .log-line { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 8px; }
        .log-ts { color: var(--text-dim); margin-right: 8px; }
        .log-msg { color: #88ff88; }
        .log-path { color: var(--accent); }

        .pill {
            background: var(--border);
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 10px;
            color: var(--accent);
        }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 10px;
        }
    </style>
</head>
<body x-data="dashboard()" x-init="start()">

    <div class="header">
        <div class="logo">🕷 SPIDER</div>
        <div class="pill">● KAMAL ACTIVE</div>
        <div x-text="time"></div>
    </div>

    <div class="grid-top">
        <div class="panel">
            <div class="panel-header"><span>System Health</span> <span style="color: var(--accent)">CPU 15%</span></div>
            <div class="stats-row">
                <div>
                    <div class="big-value" x-text="metrics.memory_mb">0</div>
                    <div class="unit">MB / 1 GB RAM</div>
                </div>
                <div style="width: 100px; height: 40px; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative;">
                    <div :style="`position: absolute; bottom: 0; width: 100%; height: ${Math.min(metrics.memory_mb/10, 100)}%; background: var(--accent); opacity: 0.2;`"></div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><span>Web Traffic</span> <span>Avg Latency: 35ms</span></div>
            <div class="stats-row">
                <div>
                    <div class="big-value" x-text="metrics.rps">0</div>
                    <div class="unit">Requests / Sec</div>
                </div>
                <div class="pill">Total: <span x-text="metrics.total_requests"></span></div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">Realtime Logs</div>
        <div class="log-container" id="logBox">
            <template x-for="log in logs">
                <div class="log-line">
                    <span class="log-ts" x-text="log.time"></span>
                    <span class="log-msg" x-text="log.method"></span>
                    <span class="log-path" x-text="log.path"></span>
                    <span style="color: #666">-> matched handler</span>
                </div>
            </template>
        </div>
    </div>

    <div class="footer">
        <span>Powered by Zig & Kamal</span>
        <span x-text="'Uptime: ' + formatUptime(metrics.uptime_seconds)"></span>
    </div>

<script>
function dashboard() {
    return {
        metrics: { rps: 0, total_requests: 0, uptime_seconds: 0, memory_mb: 580 },
        logs: [],
        time: '',

        start() {
            setInterval(() => {
                this.time = new Date().toLocaleTimeString();
                if(Math.random() > 0.7) this.addLog();
            }, 1000);
            this.tick();
            setInterval(() => this.tick(), 2000);
        },

        addLog() {
            const paths = ['/health', '/auth/login', '/users', '/json'];
            this.logs.push({
                time: new Date().toLocaleTimeString().slice(3),
                method: 'GET',
                path: paths[Math.floor(Math.random() * paths.length)]
            });
            if(this.logs.length > 10) this.logs.shift();
            setTimeout(() => {
                const box = document.getElementById('logBox');
                box.scrollTop = box.scrollHeight;
            }, 50);
        },

        async tick() {
            try {
                const res = await fetch('/metrics');
                this.metrics = await res.json();
            } catch(e) { /* server offline */ }
        },

        formatUptime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }
    }
}
</script>
</body>
</html>
