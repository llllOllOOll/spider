version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: spider-mysql-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: spider_root_password
      MYSQL_DATABASE: spider_db
      MYSQL_USER: spider
      MYSQL_PASSWORD: spider_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      timeout: 20s
      retries: 10

  mysql-test-data:
    image: mysql:8.0
    container_name: spider-mysql-test-data
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: spider_root_password
      MYSQL_DATABASE: spider_db
      MYSQL_USER: spider
      MYSQL_PASSWORD: spider_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql
      - ./docker/mysql/test-data.sql:/docker-entrypoint-initdb.d/test-data.sql
    command: --default-authentication-plugin=mysql_native_password
    profiles:
      - test-data

volumes:
  mysql_data:
  mysql_test_data: