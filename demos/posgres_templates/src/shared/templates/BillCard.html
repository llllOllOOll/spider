<div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 { status_color }">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-lg bg-zinc-800 flex items-center justify-center">💰</div>
    <div class="flex-1">
      <p class="text-sm font-semibold">{ title }</p>
      <p class="text-xs text-zinc-400">Due { due_date }</p>
    </div>
    <div class="text-right">
      <p class="text-sm font-medium { amount_color }">{ amount }</p>
      if (days_label) {
        <span class="text-[10px] px-2 py-1 rounded bg-zinc-800 text-yellow-400">{ days_label }</span>
      }
    </div>
  </div>
  if (show_pay) {
    <button class="mt-3 w-full border border-zinc-700 rounded-lg py-2 text-sm hover:bg-zinc-800">Pay</button>
  }
</div>
