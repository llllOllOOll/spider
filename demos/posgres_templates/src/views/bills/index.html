extends "layout"

<div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Bills</h1>
    </div>

    for (bills) |bill| {
        <BillCard title="{ bill.title }" due_date="{ bill.due_date }" amount="{ bill.amount }" status_color="border-l-yellow-400" amount_color="text-red-400" show_pay="true" />
    }
</div>
