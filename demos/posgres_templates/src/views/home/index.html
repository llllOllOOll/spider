extends "layout"

<h1 class="text-3xl font-bold text-gray-900 mb-6">Benchmark</h1>

<Card title="Counter">
    <p class="text-gray-600 text-lg">Count: { count }</p>
</Card>

<Card title="Users">
    <ul class="space-y-2">
        for (users) |user| {
            <li class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                <span class="font-medium text-gray-900">{ user.name }</span>
                <span class="text-gray-500">{ user.email }</span>
            </li>
        }
    </ul>
</Card>
